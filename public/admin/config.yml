backend:
  name: git-gateway
  branch: main
  repo: green-tea-subs/green-tea-subs-site

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

publish_mode: editorial_workflow

collections:
  - name: "works"
    label: "作品"
    folder: "src/content/works"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "text", required: false }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "分类", name: "category", widget: "select", options: ["anime", "movie", "ova", "other"], default: "anime" }
      - { label: "标签", name: "tags", widget: "list", allow_add: true, required: false }
      - { label: "季度", name: "season", widget: "string", required: false, hint: "如: 2025春" }
      - { label: "集数", name: "episode", widget: "number", required: false }
      - { label: "片源", name: "source", widget: "string", required: false, hint: "如: Baha, CR, ABEMA" }
      - { label: "正文", name: "body", widget: "markdown" }
      - { label: "精选", name: "featured", widget: "boolean", default: false }
      - { label: "发布日期", name: "pubDate", widget: "datetime", default: "{{now}}" }
      - { label: "语言", name: "lang", widget: "select", options: ["zh", "ja", "en"], multiple: true, default: ["zh"] }

  - name: "misc"
    label: "杂谈"
    folder: "src/content/misc"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "text", required: false }
      - { label: "标签", name: "tags", widget: "list", allow_add: true, required: false }
      - { label: "正文", name: "body", widget: "markdown" }
      - { label: "发布日期", name: "pubDate", widget: "datetime", default: "{{now}}" }
      - { label: "语言", name: "lang", widget: "select", options: ["zh", "ja", "en"], multiple: true, default: ["zh"] }

  - name: "about"
    label: "关于页面"
    folder: "src/content/about"
    create: false
    delete: false
    files:
      - name: "index"
        label: "关于我们"
        file: "src/content/about/index.md"
        fields:
          - { label: "标题", name: "title", widget: "string" }
          - { label: "正文", name: "body", widget: "markdown" }

  - name: "showcase"
    label: "展示板数据"
    folder: "src/content/showcase"
    create: true
    delete: true
    fields:
      - { label: "季度", name: "season", widget: "string", hint: "如: 2025春" }
      - { label: "番剧列表", name: "shows", widget: "list", fields: 
          [
            { label: "番剧名称", name: "title", widget: "string" },
            { label: "正则匹配", name: "regex", widget: "string", hint: "用于 RSS 解析匹配" },
            { label: "同时出现季度", name: "alsoIn", widget: "list", required: false },
            { label: "版本", name: "versions", widget: "list", fields:
              [
                { label: "版本名", name: "name", widget: "string" },
                { label: "已完成集数", name: "episodes", widget: "list", required: false, default: [] }
              ]
            }
          ]
        }
