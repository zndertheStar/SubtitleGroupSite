name: Anti-Spam Bot

on:
  discussion:
    types: [created]
  discussion_comment:
    types: [created]
  schedule:
    # 每30分钟检查一次
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  detect-spam:
    runs-on: ubuntu-latest
    permissions:
      discussions: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm install @octokit/rest
      
      - name: Run Anti-Spam Detection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          node scripts/anti-spam-bot.js
