name: Showcase RSS Parser
on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  parse-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install fast-xml-parser
        
      - name: Parse RSS and update showcase
        run: |
          node scripts/parse-rss.js
        env:
          RSS_FEED_URL: ${{ secrets.RSS_FEED_URL || 'https://api.animes.garden/feed.xml' }}
          GROUP_NAME: ${{ secrets.GROUP_NAME || '绿茶字幕组' }}
          GROUP_NAME_ALT: ${{ secrets.GROUP_NAME_ALT || '' }}
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/showcase/
          git diff --cached --quiet || git commit -m "chore: auto-update showcase from RSS [skip ci]"
          git push
