name: Auto Publish Works
on:
  schedule:
    - cron: '*/30 * * * *'  # 每30分钟运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  auto-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install
        
      - name: Parse RSS and auto publish works
        run: |
          node scripts/parse-rss.js
          node scripts/auto-publish.js
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/showcase/
          git add src/content/works/
          git add src/content/.rss-cache/
          git diff --cached --quiet || git commit -m "chore: auto-publish works from RSS [skip ci]"
          git push
